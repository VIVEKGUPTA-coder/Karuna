<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Sales Dashboard</title>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>
        body{
            font-family:Segoe UI;
            background:#f5f5f5;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
            text-align:center;
        }

        input{
            margin-top:20px;
        }

        button{
            margin-top:20px;
            padding:10px 25px;
            border:none;
            background:#1565c0;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0d47a1;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Sales Performance Dashboard</h2>

<input type="file" id="jsonFile" accept=".json">

<br>

<button onclick="openDashboard()">Generate Dashboard</button>

</div>


<script>

function openDashboard(){

const file=document.getElementById("jsonFile").files[0];

if(!file){
alert("Please select JSON file");
return;
}

const reader=new FileReader();

reader.onload=function(e){

const json=e.target.result;

const newTab=window.open("");

newTab.document.write(`
<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Sales Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>

body{

font-family:Segoe UI;

margin:20px;

background:#fafafa;

}

h2{

margin-bottom:15px;

}

select{

padding:8px;

font-size:14px;

margin-bottom:20px;

}

table{

border-collapse:collapse;

width:100%;

background:white;

}

th{

background:#4da3ff;

color:white;

padding:10px;

}

td{

padding:8px;

text-align:center;

border:1px solid #ddd;

}

tfoot{

font-weight:bold;

background:#eee;

}

#chart{

margin-top:40px;

height:450px;

}

</style>

</head>

<body>

<h2>Sales Performance Dashboard</h2>

<label><b>Business Head :</b></label>

<select id="businessHead"></select>

<div id="pivot"></div>

<div id="chart"></div>

<script>

const data=${json};

const dropdown=document.getElementById("businessHead");

const heads=[...new Set(data.map(x=>x["Business Head"]))];

dropdown.innerHTML="<option value='All'>All</option>";

heads.forEach(x=>{

dropdown.innerHTML+=\`<option>\${x}</option>\`;

});

dropdown.onchange=render;

render();

function render(){

let bh=dropdown.value;

let filtered=bh=="All"

?data

:data.filter(x=>x["Business Head"]===bh);

let pivot={};

filtered.forEach(r=>{

let zm=r["ZM Name"] || "Blank";

if(!pivot[zm]){

pivot[zm]={

count:0,

qty:0,

value:0

};

}

pivot[zm].count++;

pivot[zm].qty+=Number(r["SuggestedOrder"]||0);

pivot[zm].value+=Number(r["OrderValue"]||0);

});

let rows="";

let totalCount=0;

let totalQty=0;

let totalValue=0;

let labels=[];

let values=[];

Object.keys(pivot).sort().forEach(zm=>{

let p=pivot[zm];

totalCount+=p.count;

totalQty+=p.qty;

totalValue+=p.value;

labels.push(zm);

values.push(p.value);

rows+=\`

<tr>

<td>\${zm}</td>

<td>\${p.count.toLocaleString()}</td>

<td>\${p.qty.toLocaleString()}</td>

<td>\${p.value.toLocaleString()}</td>

</tr>

\`;

});

document.getElementById("pivot").innerHTML=\`

<table>

<thead>

<tr>

<th>ZM Name</th>

<th>Count of DealerName</th>

<th>Suggested Order</th>

<th>Order Value</th>

</tr>

</thead>

<tbody>

\${rows}

</tbody>

<tfoot>

<tr>

<td>Grand Total</td>

<td>\${totalCount.toLocaleString()}</td>

<td>\${totalQty.toLocaleString()}</td>

<td>\${totalValue.toLocaleString()}</td>

</tr>

</tfoot>

</table>

\`;

Plotly.newPlot("chart",[{

x:labels,

y:values,

type:"bar"

}],{

title:"Order Value by ZM",

height:450

});

}

</script>

</body>

</html>

`);

};

reader.readAsText(file);

}

</script>

</body>

</html>
